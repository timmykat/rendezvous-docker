name: Deploy

on:
  workflow_dispatch: # 👈 manual button
  workflow_run: # 👈 automatic trigger
    workflows: ["Build and Push To Registry"]
    types:
      - completed

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.HOSTINGER_IP }}
          username: ${{ vars.HOSTINGER_USER }}
          key: ${{ secrets.RENDEZVOUS_REPO_SSH_KEY }}
          script: |
            set -e

            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              echo "Automatic workflow runs are disabled. Please trigger manually."
              exit 1
            fi

            exec 9>/tmp/deploy.lock
            flock -n 9 || {
              echo "Another deployment is in progress"
              exit 1
            }

            # Determine correct SHA depending on trigger
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="latest"
            else
              TAG="${{ github.event.workflow_run.head_sha }}"
            fi

            IMAGE="ghcr.io/${{ github.repository }}:$TAG"

            echo "Deploying image: $IMAGE"

            cd /var/www/rendezvous-docker-prod

            echo "-- Pull image --"
            docker pull $IMAGE

            echo "-- Clean assets and replace --"
            docker ps -a --filter "name=temp"
            docker stop temp 2>/dev/null || true
            docker rm -f temp || true
            docker create --name temp $IMAGE
            rm -rf ./rendezvous/public/assets
            rm -rf ./rendezvous/public/packs
            rm -f ./rendezvous/public/manifest.json
            docker cp temp:/var/www/rendezvous/public/assets ./rendezvous/public/
            docker cp temp:/var/www/rendezvous/public/packs ./rendezvous/public/ || true
            docker cp temp:/var/www/rendezvous/public/manifest.json ./rendezvous/public/manifest.json || true
            docker rm temp

            echo "-- Restart app --"
            export IMAGE_TAG=$TAG
            docker compose up -d --force-recreate

            echo "-- Health check --"
            sleep 3

            CONTAINER_ID=$(docker ps --filter "name=rails_app" --format="{{.ID}}")

            echo "Checking container $CONTAINER_ID"

            if ! docker exec "$CONTAINER_ID" curl -f http://localhost:3000; then
              echo "Health check failed! Rolling back..."
              exit 1
            fi

            echo "-- Find container --"
            if [ -z "$CONTAINER_ID" ]; then
              echo "Container not running!"
              exit 1
            fi

            echo "-- Run migrations if needed --"
            if docker exec "$CONTAINER_ID" bundle exec rails db:migrate:status | grep "down"; then
              echo "Pending migrations found. Running db:migrate..."
              docker run --rm \
                -e RAILS_ENV=production \
                $IMAGE \
                bundle exec rails db:migrate
            else
              echo "No pending migrations."
            fi

            echo "-- Save deployed version --"
            echo "$TAG" > .current_version

            echo "-- DONE --"
