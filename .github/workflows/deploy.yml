name: Deploy

on:
  workflow_dispatch: # 👈 manual button
  workflow_run: # 👈 automatic trigger
    workflows: ["Build and Push To Registry"]
    types:
      - completed

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      # Set up SSH agent
      - name: Set up SSH keys
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.RENDEZVOUS_REPO_SSH_KEY }}

      # Pre-register the host to avoid key verification delays/failures
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.HOSTINGER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # Set up and precheck done, start deploy
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.HOSTINGER_IP }}
          username: ${{ vars.HOSTINGER_USER }}
          key: ${{ secrets.RENDEZVOUS_REPO_SSH_KEY }}
          timeout: 30s # Connection timeout
          command_timeout: 30m # Script execution timeout
          script_stop: true # Stop on first error
          script: |
            set -e

            exec 9>/tmp/deploy.lock
            flock -n 9 || {
              echo "Another deployment is in progress"
              exit 1
            }

            # Determine correct SHA depending on trigger
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="latest"
            else
              TAG="${{ github.event.workflow_run.head_sha }}"
            fi

            IMAGE="ghcr.io/${{ github.repository }}:$TAG"

            echo "Deploying image: $IMAGE"

            cd /var/www/rendezvous-docker-prod

            echo "-- Update repo --"
            git fetch origin main
            git reset --hard origin/main

            echo "-- Pull image --"
            docker pull $IMAGE

            echo "-- Clean assets and replace --"
            docker ps -a --filter "name=temp"
            docker stop temp 2>/dev/null || true
            docker rm -f temp || true
            docker create --name temp $IMAGE
            rm -rf ./rendezvous/public/assets
            rm -rf ./rendezvous/public/packs
            rm -f ./rendezvous/public/manifest.json
            docker cp temp:/var/www/rendezvous/public/assets ./rendezvous/public/
            docker cp temp:/var/www/rendezvous/public/packs ./rendezvous/public/ || true
            docker cp temp:/var/www/rendezvous/public/manifest.json ./rendezvous/public/manifest.json || true
            docker rm temp

            echo "-- Restart app --"
            export SECRET_KEY_BASE="${{ secrets.SECRET_KEY_BASE }}"
            export RAILS_ENV=production
            export REDIS_URL=redis://redis:6379/0
            export IMAGE_TAG=$TAG
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate

            CONTAINER_ID=$(docker ps --filter "name=rails_app" --format="{{.ID}}")
            echo "-- Health check -- container $CONTAINER_ID"

            sleep 3

            for i in {1..10}; do
              echo "Attempt $i..."

              if docker exec "$CONTAINER_ID" curl -f http://localhost:3000/up; then
                echo "Health check passed!"
                break
              fi

              sleep 3
            done

            if [ $? -ne 0 ]; then
              echo "Health check failed! Rolling back..."
              docker logs "$CONTAINER_ID" || true
              exit 1
            fi

            echo "-- Find container --"
            if [ -z "$CONTAINER_ID" ]; then
              echo "Container not running!"
              exit 1
            fi

            docker exec -e RAILS_ENV=production "$CONTAINER_ID" bundle exec rails db:migrate

            echo "-- Save deployed version --"
            echo "$TAG" > .current_version

            echo "-- DONE --"
