name: Deploy

on:
  workflow_run:
    workflows: ["Build and Push Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.HOSTINGER_IP }}
          username: ${{ vars.HOSTINGER_USER }}
          key: ${{ secrets.RENDEZVOUS_REPO_SSH_KEY }}
          script: |
            set -e

            IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"

            cd /var/www/rendezvous-docker-prod

            echo "-- Pull image --"
            docker pull $IMAGE

            echo "-- Extract assets --"
            docker create --name temp $IMAGE
            docker cp temp:/var/www/rendezvous/public/assets ./rendezvous/public/assets
            docker cp temp:/var/www/rendezvous/public/packs ./rendezvous/public/packs || true
            docker cp temp:/var/www/rendezvous/public/manifest.json ./rendezvous/public/manifest.json || true
            docker rm temp

            echo "-- Restart app --"
            export IMAGE_TAG=${{ github.sha }}
            docker compose up -d --force-recreate

            echo "-- Health check --"
            sleep 3

            CONTAINER_ID=$(docker ps --filter "name=rails_app_pro" --format="{{.ID}}")

            if ! docker exec "$CONTAINER_ID" curl -f http://localhost:3000; then
              echo "Health check failed! Rolling back..."
              exit 1
            fi

            echo "-- Find container --"
            CONTAINER_ID=$(docker ps --filter "name=rails_app_pro" --format="{{.ID}}")

            if [ -z "$CONTAINER_ID" ]; then
              echo "Container not running!"
              exit 1
            fi

            echo "-- Run migrations if needed --"
            if docker exec "$CONTAINER_ID" bundle exec rails db:migrate:status | grep "down"; then
              echo "Pending migrations found. Running db:migrate..."
              docker run --rm \
                -e RAILS_ENV=production \
                ghcr.io/your/repo:$SHA \
                bundle exec rails db:migrate
            else
              echo "No pending migrations."
            fi

            echo "-- Save deployed version --"
            echo "${{ github.sha }}" > .current_version

            echo "-- DONE --"
