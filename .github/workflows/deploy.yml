name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push To Registry"]
    types:
      - completed

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.HOSTINGER_IP }}
          username: ${{ vars.HOSTINGER_USER }}
          key: ${{ secrets.RENDEZVOUS_REPO_SSH_KEY }}
          timeout: 30s
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            exec 9>/tmp/deploy.lock
            flock -n 9 || {
              echo "Another deployment is in progress"
              exit 1
            }

            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="latest"
            else
              TAG="${{ github.event.workflow_run.head_sha }}"
            fi

            IMAGE="ghcr.io/${{ github.repository }}:$TAG"
            COMPOSE=(docker compose -f docker-compose.yml -f docker-compose.prod.yml)

            echo "Deploying image: $IMAGE"

            cd /var/www/rendezvous-docker-prod
            PREVIOUS_TAG="$(cat .current_version 2>/dev/null || true)"
            echo "Previous version: ${PREVIOUS_TAG:-none}"

            echo "-- Update repo --"
            git fetch origin main
            git reset --hard origin/main

            echo "-- Pull image --"
            docker pull "$IMAGE"

            echo "-- Export env --"
            export SECRET_KEY_BASE="${{ secrets.SECRET_KEY_BASE }}"
            export RAILS_ENV=production
            export REDIS_URL=redis://redis:6379/0
            export IMAGE_TAG="$TAG"

            echo "-- Ensure runtime-writable paths owned by webuser --"
            "${COMPOSE[@]}" run --rm --no-deps -T --user root rails_app bash -lc '
              set -e
              mkdir -p /var/www/rendezvous/{log,tmp,public/assets,app/assets/builds}
              chown -R 1001:1001 /var/www/rendezvous/log \
                                /var/www/rendezvous/tmp \
                                /var/www/rendezvous/public/assets \
                                /var/www/rendezvous/app/assets/builds
              find /var/www/rendezvous/app/assets/builds -type d -exec chmod 755 {} \;
              find /var/www/rendezvous/app/assets/builds -type f -exec chmod 644 {} \;
            '

            echo "-- Start dependencies --"
            "${COMPOSE[@]}" up -d db redis

            echo "-- Run migrations in one-off container --"
            "${COMPOSE[@]}" run --rm --no-deps -T --user 1001:1001 rails_app \
              bundle exec rails db:migrate

            echo "-- Build + precompile assets --"
            "${COMPOSE[@]}" run --rm --no-deps -T --user 1001:1001 rails_app \
              bash -lc 'cd /var/www/rendezvous && yarn build:css && RAILS_ENV=production bundle exec rails assets:clobber assets:precompile'

            echo "-- Restart app containers --"
            "${COMPOSE[@]}" up -d --force-recreate rails_app sidekiq

            echo "-- Find app container --"
            CONTAINER_ID=$(docker ps --filter "name=rails_app" --format="{{.ID}}" | head -n 1)

            if [ -z "$CONTAINER_ID" ]; then
              echo "rails_app container not running!"
              "${COMPOSE[@]}" ps
              exit 1
            fi

            echo "-- Health check -- container $CONTAINER_ID"
            HEALTH_OK=0

            sleep 5

            for i in {1..15}; do
              echo "Attempt $i..."

              if docker exec "$CONTAINER_ID" curl -fsS http://localhost:3000/up; then
                echo "Health check passed!"
                HEALTH_OK=1
                break
              fi

              sleep 4
            done

            if [ "$HEALTH_OK" -ne 1 ]; then
              echo "Health check failed for tag $TAG"
              docker logs "$CONTAINER_ID" || true

              if [ -n "${PREVIOUS_TAG:-}" ]; then
                echo "-- Rolling back to $PREVIOUS_TAG --"
                export IMAGE_TAG="$PREVIOUS_TAG"
                "${COMPOSE[@]}" up -d --force-recreate rails_app sidekiq
              fi

              exit 1
            fi

            echo "-- Save deployed version --"
            echo "$TAG" > .current_version

            echo "-- DONE --"
