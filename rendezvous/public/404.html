<!doctype html>
<html>
    <head>
        <title>Page not found! (404)</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <style>
            body {
                padding: 60px 10vw 40px;
                background-color: #efefef;
                background-image: url("/Peugeot-404-pub.webp");
                background-size: cover;
                color: black;
                font-family: arial, sans-serif;
                margin: 0;
                font-weight: bold;
            }

            div.dialog {
                width: 40vw;
                background-color: #ddd;
                padding: 2rem;
                border-radius: 1rem;
                opacity: 0.75;
                font-weight: bold;
            }

            h1 {
                font-size: 2rem;
                color: black;
                line-height: 1.5em;
            }

            div.dialog > p {
                font-size: 1.5rem;
            }
        </style>
    </head>

    <body>
        <!-- This file lives in public/500.html -->
        <div class="dialog">
            <div>
                <h1>(404) Not found!</h1>
                <p>
                    Hi, Tim here. That Peugeot 404 is tough and practical. The
                    page requested is not - it doesn't exist. Please check for
                    typos!
                </p>

                <p>Thanks!</p>
            </div>
        </div>
    </body>
</html>
