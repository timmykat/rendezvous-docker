<!doctype html>
<html>
    <head>
        <title>We're sorry, but something went wrong (500)</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <style>
            body {
                padding: 200px 10vw 40px;
                background-color: #efefef;
                background-image: url("/fiat-500.jpg");
                background-size: cover;
                color: black
                text-align: left;
                font-family: arial, sans-serif;
                margin: 0;
            }

            div.dialog {
                width: 40vw;
                background-color: #ddd;
                padding: 2rem;
                border-radius: 1rem;
                opacity: 0.75;
                font-weight: bold;
                margin: 0 auto 0;
            }

            h1 {
                font-size: 2rem;
                line-height: 1.5em;
            }

            div.dialog > p {
                font-size: 1.5rem;
            }
        </style>
    </head>

    <body>
        <!-- This file lives in public/500.html -->
        <div class="dialog">
            <div>
                <h1>(500) Sorry, app error!</h1>
                <p>
                    Hi, Tim here. A 500 error is not as fun as a Fiat 500. This
                    most likely means I need to fix something.
                </p>
                <p>
                    I should receive a notification, so I'll try to take care of
                    it as soon as possible.
                </p>
                <p>Thanks for your patience!</p>
            </div>
        </div>
    </body>
</html>
